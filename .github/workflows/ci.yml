name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    name: smoke (py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check (compileall)
        run: python -m compileall -q app run_cli.py tests

      - name: Smoke test (fake sample → income statement)
        run: python tests/smoke_test.py

      - name: CLI runs end-to-end
        run: python run_cli.py data/_FAKE_yogiyo_sample.xlsx --out /tmp/out.xlsx
